services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service-app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: order-service
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://orders_user:orders_password@postgres:5432/orders_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: local-dev-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_ISSUER: order-service
      JWT_AUDIENCE: order-service-api
    depends_on:
      - postgres
      - redis
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service-worker
    command: ["python", "-m", "app.workers.order_consumer"]
    environment:
      APP_NAME: order-service-worker
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://orders_user:orders_password@postgres:5432/orders_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ORDER_CREATED_TOPIC: orders.created
      JWT_SECRET_KEY: local-dev-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_ISSUER: order-service
      JWT_AUDIENCE: order-service-api
    depends_on:
      - kafka

  postgres:
    image: postgres:16
    container_name: order-service-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password
      POSTGRES_DB: orders_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: order-service-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: order-service-kafka
    ports:
      - "9092:9092"
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      JWT_SECRET_KEY: local-dev-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_ISSUER: order-service
      JWT_AUDIENCE: order-service-api

  outbox-publisher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service-outbox-publisher
    command: ["python", "-m", "app.workers.outbox_publisher"]
    environment:
      APP_NAME: order-service-outbox-publisher
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://orders_user:orders_password@postgres:5432/orders_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ORDER_CREATED_TOPIC: orders.created
      JWT_SECRET_KEY: local-dev-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_ISSUER: order-service
      JWT_AUDIENCE: order-service-api
    depends_on:
      - postgres
      - kafka

volumes:
  postgres_data: