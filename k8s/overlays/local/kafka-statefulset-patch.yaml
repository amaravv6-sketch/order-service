apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  template:
    spec:
      containers:
        - name: kafka
          env:
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "1@local-kafka-0.local-kafka-headless:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://local-kafka:9092"