apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-outbox-publisher
  labels:
    app: order-service-outbox-publisher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service-outbox-publisher
  template:
    metadata:
      labels:
        app: order-service-outbox-publisher
    spec:
      containers:
        - name: outbox-publisher
          image: order-service-app:v1
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.workers.outbox_publisher"]
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"